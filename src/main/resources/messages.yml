# All player-facing messages. Use & for colors.
# Available variables: {player}, {currency}, {amount}, {currency_name}.
help:
  - '&b&lPointsAPI &eby Z609'
  - '&b/points set <username> <currency> <amount> &7- Set points'
  - '&b/points add|give <username> <currency> <amount> &7- Add points'
  - '&b/points deduct|take <username> <currency> <amount> &7- Deduct points'
  - '&b/points reset <username> <currency> &7- Reset points'
  - '&b/points reload &7- Reload messages.yml'

insufficient-permissions: '&cInsufficient privileges.'
players-only: '&cOnly players can use /points without arguments.'
unknown-subcommand: '&cUnknown points subcommand. Use /points help.'
missing-update-arguments: '&cPlease specify a username, currency, and an amount!'
missing-reset-arguments: '&cPlease specify a username and a currency!'
invalid-currency: '&cInvalid currency: &f{currency}'
invalid-number: '&cThat is not a number!'
invalid-player: '&cThat player name is not a valid Minecraft username!'
balance: '&bYou have {amount} {currency_name}!'
target-balance-updated: '&bYour {currency_name} balance was updated to {amount}.'
account-balance-updated: '&bYou updated {player}''s {currency_name} balance to {amount}.'
reloaded: '&aPointsAPI messages were reloaded.'
developer-notice: '&dPointsAPI> &7Hey, &e{player}&7! This server uses your plugin, &ePointsAPI&7!'
